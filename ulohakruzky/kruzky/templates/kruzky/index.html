<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Zoznam krúžkov</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2b2b45);
            color: #fff;
        }
    
        h1 {
            text-align: center;
            padding: 30px;
            font-size: 2.5em;
            letter-spacing: 1px;
        }
    
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    
        th {
            background: linear-gradient(90deg, #ff7a18, #ff3cac);
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
    
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    
        tr {
            transition: all 0.3s ease;
        }
    
        tr:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.01);
        }
    
        tbody tr:nth-child(even) {
            background: rgba(255,255,255,0.03);
        }
    
        tbody tr:last-child td {
            border-bottom: none;
        }
    
        /* Glow efekt na header */
        th {
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.6);
        }
    
        /* Animácia načítania */
        table {
            animation: fadeIn 0.8s ease-in-out;
        }
    
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    
        /* Prázdna tabuľka */
        td[colspan="5"] {
            padding: 30px;
            font-size: 1.2em;
            color: #ccc;
        }
    </style>
</head>
<body>

    <h1>Zoznam krúžkov</h1>

    <table>
        <thead>
            <tr>
                <th>Názov krúžku</th>
                <th>Deň</th>
                <th>Miestnosť</th>
                <th>Meno vedúceho</th>
                <th>E-mail vedúceho</th>
            </tr>
        </thead>
        <tbody>
            {% for kruzok in kruzky %}
            <tr>
                <td>{{ kruzok.nazov }}</td>
                <td>{{ kruzok.den }}</td>
                <td>{{ kruzok.miestnost }}</td>
                <td>{{ kruzok.veduci.meno }}</td>
                <td>{{ kruzok.veduci.email }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">Žiadne krúžky nie sú dostupné.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
